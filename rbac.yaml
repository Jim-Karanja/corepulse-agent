apiVersion: v1
kind: ServiceAccount
metadata:
  name: corepulse-sa
  namespace: default
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: corepulse-role
rules:
  # Permissions for the agent to observe and fix the cluster
  - apiGroups: [""]
    resources: ["pods", "nodes", "configmaps", "services", "events"]
    verbs: ["get", "list", "watch", "patch", "delete"]
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets"]
    verbs: ["get", "list", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: corepulse-bind
subjects:
  - kind: ServiceAccount
    name: corepulse-sa
    namespace: default
roleRef:
  kind: ClusterRole
  name: corepulse-role
  apiGroup: rbac.authorization.k8s.io